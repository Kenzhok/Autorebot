spec_version: 1
name: code_review_env
display_name: "Code Review AI Environment"
description: >
  An RL environment where an AI agent acts as a senior code reviewer.
  The agent receives code diffs and must decide to flag_bug, approve, or ignore them.
  Tasks span easy (hardcoded secrets, SQL injection) to hard (JWT bypass, SSRF, ReDoS).
  Rewards are partial-credit based on correctness and explanation quality.
type: space
runtime: fastapi
app: code_review_env.server.app:app
port: 7860
tags:
  - openenv
  - code-review
  - security
  - reinforcement-learning

action_space:
  type: discrete
  fields:
    - name: action_type
      type: string
      values: [flag_bug, approve, ignore]
      description: "The review decision"
    - name: comment
      type: string
      description: "Explanation of the decision (used for partial credit on hard tasks)"
    - name: severity
      type: string
      values: [critical, medium, low]
      required: false
      description: "Severity classification (optional)"

observation_space:
  fields:
    - name: current_diff
      type: object
      description: "The code diff to review"
    - name: steps_remaining
      type: integer
      description: "Steps left in the episode"
    - name: step
      type: integer
      description: "Current step number"
    - name: total_tasks
      type: integer
      description: "Total tasks in this episode"
    - name: feedback
      type: string
      description: "Human-readable feedback on the last action"
    - name: task_difficulty
      type: string
      values: [easy, medium, hard]
      description: "Difficulty of the current task"
    - name: reward
      type: float
      description: "Reward received for the last action"
    - name: done
      type: boolean
      description: "Whether the episode is complete"

reward:
  min: 0.10
  max: 0.90
  description: >
    0.90 correct action on easy/medium task,
    0.90 correct on hard task with explanatory comment,
    0.70 correct on hard task without comment (partial credit),
    0.50 ignore on safe code (cautious but acceptable),
    0.30 ignore on a real bug (missed the issue),
    0.15 flag safe code as bug (false positive),
    0.10 approve a buggy diff (worst outcome -- ships a vulnerability)

difficulties:
  - easy
  - medium
  - hard
  - all

max_steps: 15

tasks:
  - name: easy_code_review
    description: >
      Review 5 easy code diffs for hardcoded secrets, SQL f-string injection,
      division-by-zero without guard, unused imports (style, should ignore),
      and a safe well-tested utility function (should approve).
    grader: graders:easy_grader

  - name: medium_code_review
    description: >
      Review 5 medium-difficulty diffs covering missing authentication before
      data access, plaintext password storage, off-by-one index errors,
      sensitive auth token written to logs, and an unsynchronised shared counter
      (race condition).
    grader: graders:medium_grader

  - name: hard_code_review
    description: >
      Review 5 hard diffs requiring deep security expertise: JWT signature-
      verification bypass, insecure pickle deserialisation (RCE), ReDoS via
      catastrophic regex backtracking, Server-Side Request Forgery (SSRF),
      and complex well-tested business logic (should approve).
    grader: graders:hard_grader
